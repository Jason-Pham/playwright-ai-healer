name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 15
    needs: unit-tests
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      TEST_ENV: prod

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Chromium Browsers
            runs-on: ubuntu-24.04
            projectFlags: --project=chromium --project=chrome --project=edge --project=mobile-chrome
            browsers: chromium chrome msedge
            browser-engine: chromium
            testFilter: ''
          - name: Firefox
            runs-on: ubuntu-24.04
            projectFlags: --project=firefox
            browsers: firefox
            browser-engine: firefox
            testFilter: --grep-invert "Self-Healing"
          - name: WebKit Browsers
            runs-on: macos-latest
            projectFlags: --project=webkit --project=mobile-safari --project=tablet
            browsers: webkit
            browser-engine: webkit
            testFilter: --grep-invert "Self-Healing"

    name: E2E — ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser-engine }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.browser-engine }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browsers }}

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser-engine }}

      - name: Run Playwright tests
        run: npx playwright test ${{ matrix.projectFlags }} ${{ matrix.testFilter }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.name }}
          path: playwright-report/
          retention-days: 7
