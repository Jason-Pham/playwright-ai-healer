services:
  # Run typecheck → lint → format check → unit tests
  unit-tests:
    build: .
    image: self-healing-agent
    command: ["npm", "run", "validate"]

  # Run E2E tests (headless, prod environment)
  e2e-tests:
    build: .
    image: self-healing-agent
    command: ["npm", "run", "test:prod"]
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - BASE_URL=${BASE_URL:-https://books.toscrape.com/}
      - TEST_ENV=${TEST_ENV:-prod}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HEADLESS=${HEADLESS:-true}
      - TEST_TIMEOUT=${TEST_TIMEOUT:-120000}
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
      - ./logs:/app/logs
    ipc: host
